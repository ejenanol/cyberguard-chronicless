async function getCount() {
  const { data } = await sb.from('player_count').select('count').eq('id', 1).single();

}
async function incrementCount() {
  const current = await getCount();
  await sb.from('player_count').update({ count: current + 1 }).eq('id', 1);

}
async function getFeedbacks() {

const MAX_XP = 950;
function getLvl(xp) {
  if (xp < 150) return [1,"Script Kiddie"];
  if (xp < 350) return [2,"Junior Analyst"];
  if (xp < 600) return [3,"Security Specialist"];
  if (xp < 850) return [4,"Senior Analyst"];
  return [5,"CyberGuard Elite"];
}

function decipher(txt, n) {
  return txt.split('').map(c => {
    const code = c.charCodeAt(0);
    if (code >= 65 && code <= 90) return String.fromCharCode(((code - 65 - n + 26) % 26) + 65);
    return c;
  }).join('');
}

  if (s.screen === 'title') return buildHdr() + buildTitle();
  if (s.screen === 'story') return buildHdr() + buildStory();
  if (s.screen === 'challenge') return buildHdr() + buildChallenge();
  if (s.screen === 'result') return buildHdr() + buildResult();
  if (s.screen === 'chap_end') return buildHdr() + buildChapEnd();

    const action = unlocked ? `onclick="startChap(${i})"` : '';

      <div style="flex:1">
        <div style="color:${done ? ch.color : '#c8f7c5'};font-weight:bold;margin-bottom:3px">Ch.${ch.id}: ${ch.title} ${done ? '✓' : ''}</div>
        <div class="dim">${ch.topic} · ${totalXP} XP available</div>
      </div>
      ${status}
    </div>`;
  }).join('');

  const winBanner = state.doneChaps.length === GD.chapters.length ? `

    <div class="dim">Chapter ${chap.id} · ${chap.title} · Scene ${state.sceneIdx+1}/${chap.story.length}</div>

          FROM: ${sp('email','security@nexac0rp.com')}<br>
          TO: you@nexacorp.com<br>
          SUBJECT: ${sp('urgency','⚠️ URGENT: Your account suspended in 24 hours!')}
        </div>
        <div style="border-top:1px solid #1a2e1a;padding-top:12px;line-height:2">
          Dear Valued Employee,<br><br>
          We detected unusual activity. Your account will be ${sp('urgency','SUSPENDED unless you verify IMMEDIATELY')}.<br><br>
          Click here → ${sp('link','http://nexacorp-security.verify-now.tk/login','#06b6d4')}<br><br>
          ${sp('threat','Failure to act within 24 hours = permanent account termination.')}<br><br>
          — NexaCorp Security Team
        </div>
      </div>
      <div style="margin-top:10px">
        <div class="dim">Found: ${found.size} / ${chal.spots.length} — click the suspicious elements above</div>
        ${foundList}
      </div>
      ${confirmBtn}`;
  }

  if (chal.type === 'caesar') {
    const decoded = state.shift > 0 ? decipher(chal.encrypted, state.shift) : '——————————————————————';
    const correct = decoded === chal.answer;
    const confirmBtn = correct ? `<button class="btn-primary" onclick="submitCaesar()">CONFIRM DECRYPTION ▶</button>` : '';
    const hint2 = !correct && state.shift > 0 ? `<div class="dim" style="margin-top:6px">Keep adjusting... make the message readable English.</div>` : '';
    body = `<div class="h2">${chal.title}</div>
      <div class="card" style="background:#060a06">
        <div class="dim">INTERCEPTED MESSAGE (ENCRYPTED):</div>
        <div style="color:#f97316;font-size:20px;letter-spacing:4px;margin:10px 0;font-weight:bold">${chal.encrypted}</div>
        <div class="dim">YOUR DECRYPTION (shift = ${state.shift}):</div>
        <div style="color:${correct ? '#00ff41' : '#c8f7c5'};font-size:20px;letter-spacing:4px;margin:10px 0;min-height:30px;font-weight:${correct ? 'bold' : 'normal'}">${decoded}</div>
      </div>
      <div style="display:flex;align-items:center;gap:14px;margin:14px 0;padding:14px;background:#0c160c;border-radius:3px">
        <span class="dim">SHIFT:</span>
        <input type="range" min="0" max="25" value="${state.shift}" oninput="setShift(this.value)" style="flex:1;accent-color:#00ff41;cursor:pointer">
        <span style="color:#00ff41;min-width:24px;font-size:18px;font-weight:bold">${state.shift}</span>
      </div>
      ${confirmBtn}${hint2}`;
  }

  if (chal.type === 'log_analysis') {
    const rows = chal.logs.map(log => {
      const sel = state.selLog === log.id;
      return `<tr class="${sel ? 'sel-log' : ''}" onclick="selectLog(${log.id})">
        <td>${log.id}</td><td>${log.time}</td><td>${log.src}</td><td>${log.dst}</td><td>${log.port}</td><td>${log.proto}</td>
      </tr>`;
    }).join('');
    const confirmBtn = state.selLog !== null ? `<button class="btn-primary" onclick="submitLog()">CONFIRM SELECTION</button>` : '';
    body = `<div class="h2">${chal.title}</div>
      <div class="dim">${chal.desc}</div>
      <div style="overflow-x:auto;margin-top:12px">
        <table><thead><tr><th>#</th><th>TIME</th><th>SOURCE IP</th><th>DESTINATION</th><th>PORT</th><th>PROTOCOL</th></tr></thead>
        <tbody>${rows}</tbody></table>
      </div>
      ${confirmBtn}`;
  }

  const hintBox = state.hint ? `<div class="hint-box"><div class="dim" style="margin-bottom:6px">▸ MAYA CHEN:</div>${state.hint}</div>` : '';
  const hintBtn = state.hintLoading ? `<button class="btn-orange" disabled>⏳ LOADING...</button>` : `<button class="btn-orange" onclick="getHint()">💡 ASK MAYA FOR HINT</button>`;

  return `<div class="main">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <div class="dim">Ch.${chap.id} · Mission ${state.chalIdx+1}/${chap.challenges.length} · ${chal.xp} XP</div>
      <div class="tag">${chap.topic}</div>
    </div>
    <div class="card">${body}</div>
    <div>${hintBtn}<button class="btn-ghost" onclick="goTitle()">← MENU</button></div>
    ${hintBox}
  </div>`;
}

function buildResult() {
  const r = state.result;
  const borderColor = r.ok ? '#00ff41' : '#f97316';
  const icon = r.ok ? '✅' : '❌';
  const label = r.ok ? 'CORRECT!' : 'INCORRECT';
  const xpLine = r.ok ? `<div style="color:#00ff41;font-size:13px">+${r.earned} XP EARNED</div>` : '';
  const chap = GD.chapters[state.chapIdx];
  const isLastChal = state.chalIdx >= chap.challenges.length - 1;
  return `<div class="main">
    <div class="card" style="border-color:${borderColor};text-align:center;padding:28px">
      <div style="font-size:44px;margin-bottom:10px">${icon}</div>
      <div style="color:${borderColor};font-size:18px;font-weight:bold;margin-bottom:6px">${label}</div>
      ${xpLine}
    </div>
    <div class="card" style="margin-top:12px">
      <div class="dim">▸ EXPLANATION</div>
      <div style="margin-top:10px;font-size:13px;line-height:1.9">${r.expl}</div>
    </div>
    <button class="btn-primary" onclick="nextChal()">${isLastChal ? 'CHAPTER COMPLETE ▶' : 'NEXT MISSION ▶'}</button>
  </div>`;
}

function buildChapEnd() {
  const chap = GD.chapters[state.chapIdx];
  const entries = chap.codex.map(e => `
    <div style="padding:8px 0;border-bottom:1px solid #0c140c;font-size:13px">
      <span style="color:#00ff41;font-weight:bold">${e.term}</span>
      <span class="dim"> — </span>
      <span>${e.def}</span>
    </div>`).join('');
  const isLast = state.chapIdx >= GD.chapters.length - 1;
  return `<div class="main">
    <div class="card" style="border-color:${chap.color};text-align:center;padding:32px">
      <div style="font-size:44px;margin-bottom:10px">${chap.icon}</div>
      <div style="color:${chap.color};font-size:18px;font-weight:bold">CHAPTER ${chap.id} COMPLETE</div>
      <div style="color:#c8f7c5;margin-top:6px">${chap.title}</div>
    </div>
    <div class="card" style="margin-top:12px">
      <div style="color:#00ff41;margin-bottom:10px;font-size:12px;letter-spacing:1px">▸ CODEX ENTRIES UNLOCKED</div>
      ${entries}
    </div>
    <button class="btn-primary" onclick="goTitle()">${isLast ? '🏆 FINISH GAME' : '→ NEXT CHAPTER'}</button>
  </div>`;
}

function buildCodex() {
  const entries = state.codex.length === 0
    ? `<div class="card" style="color:#3d6b3a;text-align:center;padding:40px">Complete missions to unlock entries.</div>`
    : state.codex.map(e => `<div class="card" style="margin-bottom:8px"><div style="color:#00ff41;font-weight:bold;margin-bottom:5px">${e.term}</div><div style="font-size:13px;line-height:1.6">${e.def}</div></div>`).join('');
  return `<div class="main">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <div class="h2">📚 SECURITY CODEX</div>
      <button class="btn-outline" onclick="toggleCodex()">← BACK</button>
    </div>
    ${entries}
  </div>`;
}

function buildFeedback() {
  const fbs = state.feedbacks;
  const avg = fbs.length ? (fbs.reduce((s,f) => s + f.rating, 0) / fbs.length).toFixed(1) : null;
  const stars = n => '★'.repeat(n) + '☆'.repeat(5-n);
  const avgBlock = avg ? `<div class="card" style="display:flex;gap:20px;align-items:center;margin-bottom:14px">
    <div style="text-align:center">
      <div style="font-size:36px;font-weight:bold;color:#00ff41">${avg}</div>
      <div style="color:#f59e0b;font-size:18px">${stars(Math.round(avg))}</div>
    </div>
    <div class="dim">${fbs.length} review${fbs.length!==1?'s':''} · avg rating</div>
  </div>` : '';

  const formBlock = state.fbSubmitted
    ? `<div class="card" style="border-color:#00ff41;text-align:center;padding:18px;margin-bottom:16px"><div style="color:#00ff41">✅ Thanks for your feedback, Agent!</div></div>`
    : `<div class="card" style="border-color:#1a4a1a;margin-bottom:16px">
        <div style="color:#00ff41;font-size:12px;letter-spacing:1px;margin-bottom:12px">▸ LEAVE YOUR REVIEW</div>
        <div style="margin-bottom:10px">${[1,2,3,4,5].map(n=>`<span class="star" style="color:${n<=state.fbRating?'#f59e0b':'#1a2e1a'}" onclick="setRating(${n})">★</span>`).join('')}</div>
        <textarea class="fb" maxlength="200" oninput="setFbText(this.value)" placeholder="Share your experience...">${state.fbText}</textarea>
        <div class="dim" style="text-align:right;font-size:11px;margin-bottom:4px">${state.fbText.length}/200</div>
        <button class="btn-primary" onclick="submitFeedback()" ${(!state.fbRating || !state.fbText.trim() || state.fbLoading) ? 'disabled style="opacity:0.4;cursor:not-allowed"' : ''}>
          ${state.fbLoading ? 'SUBMITTING...' : 'SUBMIT FEEDBACK'}
        </button>
      </div>`;

  const reviewList = fbs.length === 0
    ? `<div class="card" style="color:#3d6b3a;text-align:center;padding:30px">No reviews yet — be the first!</div>`
    : fbs.map(f => `<div class="card" style="margin-bottom:8px">
        <div style="display:flex;justify-content:space-between;margin-bottom:6px">
          <span style="color:#f59e0b;font-size:14px">${stars(f.rating)}</span>
          <span class="dim">${f.xp} XP · ${new Date(f.created_at).toLocaleDateString()}</span>
        </div>
        <div style="font-size:13px;line-height:1.7">${f.text}</div>
      </div>`).join('');

  return `<div class="main">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <div class="h2">💬 PLAYER FEEDBACK</div>
      <button class="btn-outline" onclick="toggleFeedback()">← BACK</button>
    </div>
    ${avgBlock}${formBlock}
    <div class="h2">▸ RECENT REVIEWS</div>
    ${reviewList}
  </div>`;
}

// ─── TYPEWRITER ───────────────────────────────────────────────────────────────
function startTyper(text) {
  if (state.typerTimer) clearInterval(state.typerTimer);
  state.typerText = ''; state.typerIdx = 0; state.typerDone = false;
  state.typerTimer = setInterval(() => {
    const el = document.getElementById('typer-out');
    if (!el) { clearInterval(state.typerTimer); return; }
    if (state.typerIdx >= text.length) {
      clearInterval(state.typerTimer);
      state.typerDone = true;
      // Show full text, no cursor, show CONTINUE button without wiping text
      el.innerHTML = text.replace(/\n/g, '<br>');
      const btnArea = document.getElementById('typer-btn');
      if (btnArea) btnArea.style.display = 'block';
      return;
    }
    state.typerText = text.slice(0, ++state.typerIdx);
    el.innerHTML = state.typerText.replace(/\n/g, '<br>') + '<span class="cursor">█</span>';
  }, 22);
}

// ─── EVENTS ───────────────────────────────────────────────────────────────────
function bindEvents() {
  if (state.screen === 'story' && !state.typerDone) {
    const chap = GD.chapters[state.chapIdx];
    const scene = chap.story[state.sceneIdx];
    // Small delay to ensure #typer-out is in the DOM before typing starts
    setTimeout(() => startTyper(scene.text), 300);
  }
}

window.toggleCodex = () => { state.showCodex = !state.showCodex; state.showFeedback = false; render(); };
window.toggleFeedback = () => { state.showFeedback = !state.showFeedback; state.showCodex = false; render(); };
window.goTitle = () => { state.screen = 'title'; render(); };

window.startChap = async (i) => {
  if (i === 0) {
    const next = await incrementCount();
    state.playerCount = next;
  }
  state.chapIdx = i; state.sceneIdx = 0; state.chalIdx = 0;
  state.result = null; state.hint = null; state.foundSpots = new Set();
  state.selLog = null; state.shift = 0; state.selOpt = null;
  state.typerDone = false; state.screen = 'story';
  render();
};

window.advScene = () => {
  const chap = GD.chapters[state.chapIdx];
  if (state.sceneIdx < chap.story.length - 1) {
    state.sceneIdx++; state.typerDone = false; render();
  } else {
    state.chalIdx = 0; state.result = null; state.hint = null;
    state.foundSpots = new Set(); state.selLog = null; state.shift = 0; state.selOpt = null;
    state.screen = 'challenge'; render();
  }
};

window.selectOpt = (i) => { state.selOpt = i; render(); };
window.addSpot = (id) => { state.foundSpots.add(id); render(); };
window.selectLog = (id) => { state.selLog = id; render(); };
window.setShift = (v) => { state.shift = parseInt(v); render(); };
window.setRating = (n) => { state.fbRating = n; render(); };
window.setFbText = (v) => { state.fbText = v; };

window.submitMCQ = () => {
  const chal = GD.chapters[state.chapIdx].challenges[state.chalIdx];
  const ok = state.selOpt === chal.correct;
  if (ok) state.xp += chal.xp;
  state.result = { ok, expl: chal.explanations[state.selOpt], earned: ok ? chal.xp : 0 };
  state.screen = 'result'; render();
};

window.submitEmailSpot = () => {
  const chal = GD.chapters[state.chapIdx].challenges[state.chalIdx];
  state.xp += chal.xp;
  state.result = { ok: true, expl: "Excellent! You identified all 4 phishing indicators like a pro.", earned: chal.xp };
  state.screen = 'result'; render();
};

window.submitCaesar = () => {
  const chal = GD.chapters[state.chapIdx].challenges[state.chalIdx];
  state.xp += chal.xp;
  state.result = { ok: true, expl: `✅ The shift was ${chal.shift}. "${chal.answer}" — now you know their plan. Caesar ciphers have only 25 possible shifts, making them trivial to brute-force. Modern encryption uses astronomically larger key spaces.`, earned: chal.xp };
  state.screen = 'result'; render();
};

window.submitLog = () => {
  const chal = GD.chapters[state.chapIdx].challenges[state.chalIdx];
  const ok = state.selLog === chal.suspiciousId;
  if (ok) state.xp += chal.xp;
  state.result = { ok, expl: ok ? chal.explanation : "❌ Not quite. Focus on IP addresses — look for external addresses (not 192.168.x.x) accessing sensitive internal services.", earned: ok ? chal.xp : 0 };
  state.screen = 'result'; render();
};

window.nextChal = () => {
  const chap = GD.chapters[state.chapIdx];
  if (state.chalIdx < chap.challenges.length - 1) {
    state.chalIdx++;
    state.result = null; state.hint = null; state.foundSpots = new Set();
    state.selLog = null; state.shift = 0; state.selOpt = null;
    state.screen = 'challenge'; render();
  } else {
    const newE = chap.codex.filter(e => !state.codex.find(c => c.term === e.term));
    state.codex = [...state.codex, ...newE];
    state.doneChaps = [...state.doneChaps, chap.id];
    state.screen = 'chap_end'; render();
  }
};

window.getHint = async () => {
  const chal = GD.chapters[state.chapIdx].challenges[state.chalIdx];
  state.hintLoading = true; render();
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-api-key': ANTHROPIC_KEY, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
      body: JSON.stringify({ model: 'claude-sonnet-4-6', max_tokens: 200, messages: [{ role: 'user', content: `You are Maya Chen, cybersecurity mentor in a training RPG. A beginner is stuck on: "${chal.title}". Give a helpful, encouraging hint in 2-3 sentences WITHOUT giving away the answer. Be friendly, use simple language. No markdown.` }] })
    });
    const d = await res.json();
    state.hint = d.content?.[0]?.text || 'Keep trying — you can do it!';
  } catch { state.hint = 'Think carefully about what looks unusual or out of place.'; }
  state.hintLoading = false; render();
};

window.submitFeedback = async () => {
  if (!state.fbRating || !state.fbText.trim() || state.fbLoading) return;
  state.fbLoading = true; render();
  const ok = await saveFeedback(state.fbRating, state.fbText.trim(), state.xp);
  if (ok) {
    state.fbSubmitted = true;
    state.feedbacks = await getFeedbacks();
  }
  state.fbLoading = false; render();
};

// ─── INIT ─────────────────────────────────────────────────────────────────────
(async () => {
  state.playerCount = await getCount();
  state.feedbacks = await getFeedbacks();
  render();
})();
</script>
</body>
</html>
